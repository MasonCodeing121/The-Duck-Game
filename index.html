<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>The Duck Game</title>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <style>
    html, body { margin: 0; padding: 0; background: #333; }
    body { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
    #canvas-wrap { position: relative; display: inline-block; }
    canvas { display: block; box-shadow: 0 0 32px #2228; border-radius: 18px; background: #7B56F5; }

    #room-overlay {
      position: absolute;
      top: 320px;
      left: 15px;
      transform: none;
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(0,0,0,0.55);
      border-radius: 12px;
      padding: 8px 16px;
      pointer-events: all;
    }
    #room-overlay label {
      color: #fff;
      font-family: 'Courier', monospace;
      font-size: 0.95em;
      white-space: nowrap;
    }
    #roomInput {
      font-family: 'Courier', monospace;
      font-size: 0.95em;
      border: 2px solid #8465f7;
      border-radius: 7px;
      padding: 4px 10px;
      background: #1a1a2e;
      color: #fff;
      outline: none;
      width: 120px;
    }
    #roomInput:focus { border-color: #c4b5fd; }

    #name-overlay {
      position: absolute;
      top: 272px;
      left: 15px;
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(0,0,0,0.55);
      border-radius: 12px;
      padding: 8px 16px;
      pointer-events: all;
    }
    #name-overlay label {
      color: #fff;
      font-family: 'Courier', monospace;
      font-size: 0.95em;
      white-space: nowrap;
    }
    #nameInput {
      font-family: 'Courier', monospace;
      font-size: 0.95em;
      border: 2px solid #8465f7;
      border-radius: 7px;
      padding: 4px 10px;
      background: #1a1a2e;
      color: #fff;
      outline: none;
      width: 100px;
    }
    #nameInput:focus { border-color: #c4b5fd; }

    #restartBtn {
      position: absolute;
      top: 372px;
      left: 15px;
      font-family: 'Courier', monospace;
      font-size: 0.95em;
      background: rgba(160,40,40,0.75);
      color: #fff;
      border: 2px solid #f87171;
      border-radius: 10px;
      padding: 7px 20px;
      cursor: pointer;
      pointer-events: all;
    }
    #restartBtn:hover { background: rgba(220,70,70,0.9); }

    #net-status {
      position: absolute;
      top: 10px;
      right: 14px;
      font-family: 'Courier', monospace;
      font-size: 0.75em;
      color: #aaa;
      pointer-events: none;
    }
    #net-status.connected { color: #6ee7b7; }
    #net-status.error     { color: #f87171; }

    .fullscreen-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 18px 0 0 0;
      padding: 10px 26px;
      font-family: 'Courier', monospace;
      font-size: 1.2em;
      background: linear-gradient(90deg, #8465f7 0%, #6240ea 100%);
      color: #fff;
      border: none;
      border-radius: 12px;
      box-shadow: 0 4px 16px #2224;
      cursor: pointer;
      transition: background 0.18s, transform 0.13s;
      outline: none;
      gap: 8px;
      user-select: none;
    }
    .fullscreen-btn:hover, .fullscreen-btn:focus {
      background: linear-gradient(90deg, #6240ea 0%, #8465f7 100%);
      transform: scale(1.045);
      box-shadow: 0 6px 22px #2226;
    }
    h3 { color: white; margin-top: 10px; user-select: none; }

    #canvas-scale-wrap {
      position: relative;
      width: 600px;
      height: 600px;
      display: inline-block;
    }

    #canvas-wrap:-webkit-full-screen,
    #canvas-wrap:-ms-fullscreen,
    #canvas-wrap:fullscreen {
      display: flex !important;
      align-items: center;
      justify-content: center;
      width: 100vw !important;
      height: 100vh !important;
      background: #111;
    }
  </style>
</head>
<body>
  <div id="canvas-wrap">
    <div id="canvas-scale-wrap">
      <canvas id="gameCanvas"></canvas>
      <div id="room-overlay">
        <label for="roomInput">Room:</label>
        <input id="roomInput" type="text" value="duck-game" maxlength="24" spellcheck="false">
      </div>
      <div id="name-overlay">
        <label for="nameInput">Name:</label>
        <input id="nameInput" type="text" value="Duck" maxlength="16" spellcheck="false">
      </div>
      <button id="restartBtn">Restart</button>
      <div id="net-status">connecting…</div>
    </div>
  </div>

  <button id="fullscreenBtn" class="fullscreen-btn" title="Play in fullscreen">
    <svg width="22" height="22" viewBox="0 0 22 22" style="margin-right:4px;vertical-align:middle" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="2.5" y="2.5" width="6" height="2" rx="1" fill="#fff"></rect>
      <rect x="2.5" y="2.5" width="2" height="6" rx="1" fill="#fff"></rect>
      <rect x="13.5" y="2.5" width="6" height="2" rx="1" fill="#fff"></rect>
      <rect x="17.5" y="2.5" width="2" height="6" rx="1" fill="#fff"></rect>
      <rect x="2.5" y="17.5" width="6" height="2" rx="1" fill="#fff"></rect>
      <rect x="2.5" y="13.5" width="2" height="6" rx="1" fill="#fff"></rect>
      <rect x="13.5" y="17.5" width="6" height="2" rx="1" fill="#fff"></rect>
      <rect x="17.5" y="13.5" width="2" height="6" rx="1" fill="#fff"></rect>
    </svg>
    Fullscreen
  </button>
  <h3>Made by ToeKnee and Formatted for HTML5/Webview by Pear256 -
  Pretty simple game, collect pancakes, feed the carrot, have fun.
  (It's Spacebar to Dash)</h3>

  <script src="sketch.js"></script>
  <script>
    const _cWrap  = document.getElementById('canvas-wrap');
    const _cScale = document.getElementById('canvas-scale-wrap');

    function _applyFsScale() {
      if (document.fullscreenElement || document.webkitFullscreenElement) {
        const s = Math.min(screen.width / 600, screen.height / 600);
        _cScale.style.transformOrigin = 'center center';
        _cScale.style.transform = 'scale(' + s + ')';
      } else {
        _cScale.style.transform = '';
      }
    }
    document.addEventListener('fullscreenchange',       _applyFsScale);
    document.addEventListener('webkitfullscreenchange', _applyFsScale);

    document.getElementById('fullscreenBtn').addEventListener('click', () => {
      if (_cWrap.requestFullscreen)       _cWrap.requestFullscreen();
      else if (_cWrap.webkitRequestFullscreen) _cWrap.webkitRequestFullscreen();
    });
    document.oncontextmenu = () => true;
  </script>
</body>
</html>
